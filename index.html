<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>process portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 票 结构 -->
  <div class="exhibition-wrapper">
    <div class="ticket-guide">
      <p>put your mouse on the ticket</p>
      <div class="arrow-down"></div>
    </div>
    <div class="ambient-light"></div>

    <div class="ticket-container" id="ticket">
        <article class="ticket-main">
        <div class="ticket-content">
            <header class="ticket-header">
            <span class="eyebrow">A/W 2026</span>
            <span class="serial">No. 004912</span>
            </header>

            <div class="ticket-body">
            <h1 class="title">LITTLE<br />TOWN</h1>
            <p class="subtitle">Exclusive Preview & Invitation</p>
            </div>

            <footer class="ticket-footer">
            <div class="info-block">
                <span class="label">Date</span>
                <span class="value" id="today-date"></span>
            </div>
            <div class="info-block">
                <span class="label">Time</span>
                <span class="value" id="today-time"></span>
            </div>
            <div class="info-block">
                <span class="label">Admit</span>
                <span class="value">ONE</span>
            </div>
            </footer>
        </div>
        <div class="perforation-line"></div>
        </article>

        <aside class="ticket-stub">
        <div class="foil-seal"></div>
        <div class="barcode"></div>
        <p class="stub-text">VIP ACCESS</p>
        </aside>
    </div>
  </div>

  <div class="sky">
    <!-- 中央欢迎文字 -->
    <div class="sky-center-text">Welcome to Our Little Town</div>
  </div>

  <!-- 第三场景：星露谷（保留结构 + 可滚动 + 清空内容 + 纯色底部） -->
<div class="final-scene">
  <header class="d-flex justify-between align-center w-100">
    <img class="logo-icon" src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/logo.png" alt="logo">
    <img class="menu-icon" src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/menu.png" alt="menu icon">
    <nav class="dropdown-nav closed">
      <a href="#hero">
        <img src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/home-icon.png" alt="home-icon">
        Home
      </a>
    </nav>
  </header>

  <main>
    <!-- 保留：Hero 村庄 -->
    <div class="hero-bg"></div>
    <section id="hero">
      <div class="page-title">GO BUDDY</div>
      <img class="hero-img" src="image/road.png" alt="flat image">
    </section>

    <!-- 保留结构 清空内容 -->
    <section id="locations"></section>
    <section class="border"></section>
    <section id="map"></section>
    <section id="villagers"></section>
    <section id="contact"></section>

    <!-- 保留：底部纯色框（原版样式） -->
    <footer id="footerStyle" class="d-flex flex-wrap flex-col justify-center align-center">
      <div class="d-flex justify-center align-center" style="gap:20px;">
        <img class="title" src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/title.png" alt="title">
        <img class="logo-gif" src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/ca_logo.gif" alt="concernedape logo">
      </div>
      <div class="d-flex flex-wrap flex-col justify-center align-center">
        <div class="d-flex mb-20">
          <a target="_blank" href="https://twitter.com/concernedape"><img src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/twitter.png" alt="twitter"></a>
          <a target="_blank" href="https://www.facebook.com/StardewValley"><img src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/facebook.png" alt="facebook"></a>
          <a target="_blank" href="https://www.reddit.com/r/StardewValley/"><img src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/reddit.png" alt="reddit"></a>
          <a target="_blank" href="https://www.stardewvalley.net/contact/"><img src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/email.png" alt="mail"></a>
          <a target="_blank" href="https://discordapp.com/invite/StardewValley"><img src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/discord.png" alt="discord"></a>
        </div>
        <a href="#hero">
          <img src="https://res.cloudinary.com/dqfgwgif9/image/upload/v1645661048/stardew-valley/up.png" alt="back to top">
        </a>
      </div>
    </footer>
  </main>
</div>
</div>
  <script src="js/main.js"></script>
</body>
</html>
