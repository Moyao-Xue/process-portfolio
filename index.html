<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>process portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 票 结构 -->
  <div class="exhibition-wrapper">
    <div class="ambient-light"></div>

    <div class="ticket-container" id="ticket">
        <article class="ticket-main">
        <div class="ticket-content">
            <header class="ticket-header">
            <span class="eyebrow">A/W 2026</span>
            <span class="serial">No. 004912</span>
            </header>

            <div class="ticket-body">
            <h1 class="title">LITTLE<br />TOWN</h1>
            <p class="subtitle">Exclusive Preview & Invitation</p>
            </div>

            <footer class="ticket-footer">
            <div class="info-block">
                <span class="label">Date</span>
                <span class="value" id="today-date"></span>
            </div>
            <div class="info-block">
                <span class="label">Time</span>
                <span class="value" id="today-time"></span>
            </div>
            <div class="info-block">
                <span class="label">Admit</span>
                <span class="value">ONE</span>
            </div>
            </footer>
        </div>
        <div class="perforation-line"></div>
        </article>

        <aside class="ticket-stub">
        <div class="foil-seal"></div>
        <div class="barcode"></div>
        <p class="stub-text">VIP ACCESS</p>
        </aside>
    </div>
  </div>

  <!-- 下一场景（你可以随便改成你想要的内容） -->
  <!-- <div class="next-scene">
    <h1>欢迎进入主会场</h1>
  </div> -->

  <div class="sky">
    <!-- 中央欢迎文字 -->
    <div class="sky-center-text">Welcome to Our Little Town</div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
